<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Accent blue-indigo gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Text gradient for "Forge" -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Centered Icon Mark -->
  <g transform="translate(144, 40)">
    <!-- Outer C-Curve (Career) -->
    <path d="M 360 196 A 120 120 0 1 0 360 316" fill="none" stroke="url(#logo-grad)" stroke-width="28" stroke-linecap="round"/>
    
    <!-- Verified Checkmark (Career Growth & Match) -->
    <path d="M 340 185 L 244 281 L 194 231" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Forge Spark / Success Node -->
    <circle cx="340" cy="185" r="18" fill="url(#logo-grad)"/>
    <circle cx="340" cy="185" r="9" fill="#FFFFFF"/>
  </g>

  <!-- Centered Typographical Layout -->
  <text x="390" y="620" text-anchor="end" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="96" font-weight="800" fill="#FFFFFF" letter-spacing="-1px">Career</text>
  <text x="410" y="620" text-anchor="start" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="96" font-weight="800" fill="url(#text-grad)" letter-spacing="-1px">Forge</text>
  
  <!-- Tagline Centered -->
  <text x="400" y="685" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#A8B3CF" letter-spacing="2px">AI-POWERED CAREER GROWTH PLATFORM</text>
</svg>
